# ─────────────────────────────────────────────────────────
#  TRANSFORMAT — Apache Config
#  Adds /convert to your existing port 80 vhost
#
#  Place in:  /etc/apache2/sites-available/transformat.conf
#
#  Enable:
#    sudo a2enmod headers
#    sudo a2ensite transformat.conf
#    sudo systemctl reload apache2
# ─────────────────────────────────────────────────────────

<VirtualHost *:80>
    Alias /convert /srv/mergerfs/rssd_pool/rssd/AppData/Apache/convert

    <Directory /srv/mergerfs/rssd_pool/rssd/AppData/Apache/convert>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    <Location /convert>
        <IfModule mod_headers.c>
            Header always set Cross-Origin-Opener-Policy   "same-origin"
            Header always set Cross-Origin-Embedder-Policy "require-corp"
        </IfModule>
    </Location>

    <IfModule mod_mime.c>
        AddType application/wasm .wasm
    </IfModule>
</VirtualHost>
